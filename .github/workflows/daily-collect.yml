name: daily-collect

on:
  schedule:
    # KST 06:30 / 18:30 — 하루 두 번 수집 (cron은 UTC 기준)
    - cron: '30 21 * * *'
    - cron: '30 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 데이터 수집
        run: node scripts/collect.mjs

      - name: 변경 사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: $(TZ=Asia/Seoul date +%F\ %H:%M) 자동 수집"
            git push
          fi
